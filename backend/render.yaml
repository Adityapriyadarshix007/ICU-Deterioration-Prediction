services:
  - type: web
    name: icu-predictor-backend
    runtime: docker
    rootDir: backend
    repo: https://github.com/Adityapriyadarshix007/ICU-Deterioration-Prediction
    plan: free
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB_NAME
        value: icu_predictor
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: FRONTEND_URL
        value: https://icu-predictor.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://icu-predictor.vercel.app,http://localhost:5173,http://localhost:3000
      - key: DEBUG
        value: False
